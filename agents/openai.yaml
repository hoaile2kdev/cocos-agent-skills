interface:
  display_name: "Cocos Creator 2.4.15"
  short_description: "Engine rules for Cocos Creator 2.4.15"
  default_prompt: "Use $cocos-creator-2415 to implement or review Cocos Creator 2.4.15 TypeScript code."

load_order:
  - path: "../SKILL.md"
    reason: "Primary workflow, baseline rules, and common mistakes checklist."
  - path: "../agents/agent.yaml"
    reason: "Machine-readable manifest with conditional reference triggers."

reference_quick_index:
  - task: "TypeScript, decorators, API choices"
    load: "references/api-and-ts-rules.md"
  - task: "Component lifecycle, @property"
    load: "references/component-decorator-lifecycle.md"
  - task: "Node hierarchy, events, transforms, tweens"
    load: "references/node-event-transform-action.md"
  - task: "Asset loading, bundles, release"
    load: "references/asset-manager-2-4.md"
  - task: "Spine animations, skins, events"
    load: "references/spine-runtime.md"
  - task: "UI/render: Sprite, Canvas, Camera, Widget, Button, ScrollView, PageView, Slider, Scrollbar, WebView, NodePool"
    load: "references/ui-components.md"
  - task: "Audio, scene, platform, network"
    load: "references/audio-scene-platform.md"
  - task: "Graphics, win lines, masks"
    load: "references/graphics-mask.md"
  - task: "Frame animation, particles, input blocking, rich text"
    load: "references/animation-particles.md"
  - task: "Editor bindings, prefab wiring, singletons"
    load: "references/scene-binding-rules.md"
  - task: "No-Editor .prefab/.fire authoring"
    load: "references/scene-prefab-authoring.md"
  - task: "Engine source inspection"
    load: "references/engine-source-map.md"

operating_notes:
  - "Read SKILL.md first, then load only the relevant references based on the task at hand."
  - "Use scripts/cocos_serialization_tools.js for deterministic no-Editor .prefab/.fire work. Do not hand-approximate class IDs or UUIDs."
  - "Run node tests/run-tests.js after modifying the serialization tools or fixtures."
  - "When a wrong API pattern is found across multiple files (e.g. cc.v3 instead of cc.v2), use grep/search to fix all occurrences systematically."
  - "Do not use Cocos 3.x APIs. When uncertain about an API, check engine-source-map.md."
  - "Keep project-specific workflow rules outside this engine skill."
